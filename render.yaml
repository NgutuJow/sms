services:
  - type: web
    name: sms-web
    env: docker
    plan: free
    branch: main
    dockerfilePath: Dockerfile
    releaseCommand: php artisan migrate --force
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: TRUSTED_PROXIES
        value: "*"
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stack
      # Tunaiambia Laravel itumie Postgres sasa hivi
      - key: DB_CONNECTION
        value: pgsql
      # Render itajaza yenyewe URL nzima ya database hapa automatic
      - key: DATABASE_URL
        fromDatabase:
          name: sms-db
          property: url
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: mailhog
      - key: MAIL_PORT
        value: 1025

databases:
  - name: sms-db
    plan: free
    region: oregon